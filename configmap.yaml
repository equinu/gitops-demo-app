apiVersion: v1
data:
  index.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n
    \   <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n
    \   <title>SaaS Platform | Tier 1 Bank Cluster</title>\n    <style>\n        :root
    {\n            --bg: #0f172a;\n            --card: #1e293b;\n            --primary:
    #38bdf8;\n            --accent: #818cf8;\n            --text: #f1f5f9;\n        }\n
    \       body {\n            background: var(--bg);\n            color: var(--text);\n
    \           font-family: 'Inter', system-ui, -apple-system, sans-serif;\n            display:
    flex;\n            justify-content: center;\n            align-items: center;\n
    \           height: 100vh;\n            margin: 0;\n            overflow: hidden;\n
    \       }\n        .dashboard {\n            background: var(--card);\n            padding:
    3rem;\n            border-radius: 24px;\n            box-shadow: 0 25px 50px -12px
    rgba(0, 0, 0, 0.5);\n            border: 1px solid rgba(255,255,255,0.1);\n            text-align:
    center;\n            max-width: 600px;\n            position: relative;\n            backdrop-filter:
    blur(10px);\n        }\n        .status-badge {\n            display: inline-block;\n
    \           background: rgba(16, 185, 129, 0.2);\n            color: #10b981;\n
    \           padding: 0.5rem 1rem;\n            border-radius: 99px;\n            font-size:
    0.875rem;\n            font-weight: 600;\n            margin-bottom: 1.5rem;\n
    \           animation: pulse 2s infinite;\n        }\n        h1 {\n            font-size:
    2.5rem;\n            margin-bottom: 1rem;\n            background: linear-gradient(to
    right, var(--primary), var(--accent));\n            -webkit-background-clip: text;\n
    \           -webkit-text-fill-color: transparent;\n        }\n        p { color:
    #94a3b8; line-height: 1.6; margin-bottom: 2rem; }\n        .stats {\n            display:
    grid;\n            grid-template-columns: repeat(3, 1fr);\n            gap: 1rem;\n
    \           border-top: 1px solid rgba(255,255,255,0.1);\n            padding-top:
    2rem;\n        }\n        .stat-item span { display: block; font-size: 1.5rem;
    font-weight: 700; color: var(--primary); }\n        .stat-item label { font-size:
    0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; }\n
    \       @keyframes pulse {\n            0% { opacity: 1; }\n            50% {
    opacity: 0.6; }\n            100% { opacity: 1; }\n        }\n    </style>\n</head>\n<body>\n
    \   <div class=\"dashboard\">\n        <div class=\"status-badge\">● System Operational</div>\n
    \       <h1>SaaS Platform Alpha</h1>\n        <p>This workload was deployed via
    <strong>ArgoCD GitOps</strong> onto a hardened <strong>RKE2 Cluster</strong> running
    on Rocky Linux 9. Environment: Tier 1 Production.</p>\n        \n        <div
    class=\"stats\">\n            <div class=\"stat-item\">\n                <span>0.0ms</span>\n
    \               <label>Latency</label>\n            </div>\n            <div class=\"stat-item\">\n
    \               <span>100%</span>\n                <label>Uptime</label>\n            </div>\n
    \           <div class=\"stat-item\">\n                <span>2</span>\n                <label>Replicas</label>\n
    \           </div>\n        </div>\n    </div>\n</body>\n</html>\n"
kind: ConfigMap
metadata:
  name: saas-frontend-content
